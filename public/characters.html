<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="style.css" />
    <title>Characters</title>
  </head>
  <body>
    <div class="header">
      <a href="#default" class="logo">Wyrm</a>
      <div class="header-right">
        <a href="index.html">Home</a>
        <a class="active" href="characters.html">Characters</a>
        <a href="power_classifications.html">Power Classifications</a>
        <a href="questions.html">Questions</a>
      </div>
    </div>

    <h2>Search Characters</h2>

    <form autocomplete="off" id="character-search-form">
      <div class="autocomplete" style="width: 300px">
        <input id="character-search-input" type="text" name="search" placeholder="Search here" />
      </div>
      <input type="submit" value="Search" />
    </form>

    <div id="search-hint"></div>

    <div class="characters-page">
      <aside class="filter-panel">
        <h3>Filters</h3>
        <div class="filter-group">
          <label for="filter-gender">Gender</label>
          <select id="filter-gender">
            <option value="">All</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="filter-classification">Power Classification</label>
          <select id="filter-classification">
            <option value="">All</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="filter-affiliation">Affiliation</label>
          <select id="filter-affiliation">
            <option value="">All</option>
          </select>
        </div>
        <button type="button" id="clear-filters" class="filter-clear">Clear Filters</button>
      </aside>
      <section class="character-list">
        <div id="character-grid" class="character-list-grid"></div>
      </section>
    </div>

    <script src="characters.js"></script>
  </body>
</html>
